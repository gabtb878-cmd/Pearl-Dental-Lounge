<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>About Myself</title>
 <style>
 	body {
 	  margin: 0;
 	  padding: 0;
 	  background-image: url("https://img.freepik.com/premium-vector/philippines-flag-waving-wind_179267-333.jpg?semt=ais_user_personalization&w=740&q=80");
 	  background-size: cover;
 	  background-attachment: fixed;
 	  font-family: Arial, sans-serif;
 	  color: white;
 	}
  /* Navigation*/
  nav {
  	background: rgba(0, 0, 0, 0.5);
  	padding: 15px;
  	text-align: center;
  } 

  nav a {
  	color: #ffd700;
  	text-decoration: none;
  	margin: 0 20px;
  	font-weight: bold;
  }
  
  nav a:hover {
     text-decoration: underline;
  }
  /*Glass card*/
  .glass-card {

    background: rgba(255, 255, 255, 0.2);
    backdrop-filter: blur(10px);
    border-radius: 15px;
    padding: 30px;
    width: 80px;
    margin: 50px auto;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
  }

  /*Sliding Text*/
  .slide-text {
    overflow: hidden;
    white-space: nowrap;
    animation: slide 12s linear infinite;
    color: lavender;
  }
  @keyframes slide{
   from{ transform: translateX(-100px); }
   to{transform: translateX(100px);}
  }

 /*Images*/
 img {
    border-radius: 12px;
    margin: 15px;
    transition: transform 0.3s, box-shadow 0.3s;
 }  
  
 img:hover {
   transform: scale(1.05);
 }

 /*Button*/
 button {
   padding: 12px 25px;
   border:none;
   border-radius: 20px;
   background: #ff4757;
   color: white;
   font-size: 16px;
   cursor: pointer;
   margin: 20px;
 }

 button:hover{
   background: #e84118;
 }

 </style>
</head>
<body>

</body>
</html>
